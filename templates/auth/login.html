{% extends "base.html" %}

{% block styles %}
<style>

</style>
{% endblock %}

{% block scripts %}
<script>

</script>
{% endblock %}

{% block content %}
    <div class="form-card"  hx-ext="response-targets">
        <h1>Login</h1>
        <form hx-post="/api/auth/login" hx-target="#response-ok" hx-target-*="#response-error" hx-swap="innerHTML" hx-trigger="submit">
            <span>
                <label for="email">Email: </label>
                <input type="email" id="email" name="email" required>
            </span>
            <span>
                <label for="password">Password: </label>
                <input type="password" id="password" name="password" required>
            </span>
            <button type="submit">Login</button>
        </form>
        <div id="response-ok"></div>
        <div id="response-error">err</div>
    </div>
    
{% endblock %}
